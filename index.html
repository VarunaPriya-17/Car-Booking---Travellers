<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Cab Booking</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Leaflet Map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand" style="font-weight: bolder;font-size: 30px;">🚕 Smart Cab Booking</span>
</nav><br>

<div class="container mt-4">
<div class="row">

<!-- LEFT FORM -->
<div class="col-md-4">
<div class="card shadow">
<div class="card-header bg-warning text-white fw-bold">Search Cabs</div>

<div class="card-body">

<label>Pickup Location</label>
<div class="input-group mb-2">
<span class="input-group-text"><i class="fa fa-globe text-success"></i></span>
<input type="text" id="pickup" class="form-control" placeholder="Pickup location">
</div>

<label>Drop Location</label>
<div class="input-group mb-2">
<span class="input-group-text"><i class="fa fa-globe text-danger"></i></span>
<input type="text" id="drop" class="form-control" placeholder="Drop location">
</div>

<label>Pickup Date</label>
<input type="date" id="date" class="form-control mb-2">

<label>Pickup Time</label>
<input type="time" id="time" class="form-control mb-3">

<div class="alert alert-info text-center">
Distance: <b><span id="distance">0</span> KM</b>
</div>

<button class="btn btn-warning w-100 fw-bold"  type="button" id="searchCabs">
SEARCH CABS
</button>

</div>
</div>
</div>

<!-- MAP -->
<div class="col-md-8">
<div class="card shadow">
<div id="map" style="height:480px;"></div>
</div>
</div>

</div>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="js/firebase.js"></script>
<script src="js/maps.js"></script>
<script src="js/booking.js"></script>

</body>
</html>
