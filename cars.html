const carList = document.getElementById("carList");

cars.forEach(car => {
  const fare = Math.round(distance * car.rate);

  carList.innerHTML += `
  <div class="col-md-4 mb-4">
    <div class="card shadow h-100 text-center">
      <img src="${car.img}" class="card-img-top p-6">
      <div class="card-body">
        <h5>${car.name}</h5>
        <h4 class="text-primary">₹${fare}</h4>
        <small>${distance} KMs | Driver, Toll & Fuel Extra</small>
      </div>
      <div class="card-footer bg-white">
        <button class="btn btn-warning w-100"
        onclick="selectCar('${car.name}', ${fare})">
        SELECT CAR
        </button>
      </div>
    </div>
  </div>`;
});

function selectCar(car, fare) {
  localStorage.setItem("car", car);
  localStorage.setItem("fare", fare);
  window.location.href = "booking.html";
}

document.getElementById("modify").onclick = () => {
  window.location.href = "index.html";
};
</script>

</body>
</html>
