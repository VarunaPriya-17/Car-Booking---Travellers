<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Cab</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

<div class="container mt-4">
<div class="row">

<!-- LEFT FORM -->
<div class="col-md-7">
<div class="card shadow">
<div class="card-header bg-warning text-white">
<h5>CONTACT & PICKUP DETAILS</h5>
</div>

<div class="card-body">
<form id="bookingForm">

<div class="mb-3">
<label>Name</label>
<input type="text" id="name" class="form-control" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" id="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Mobile</label>
<input type="tel" id="mobile" class="form-control" required>
</div>

<div class="mb-3">
<label>Pickup Address</label>
<textarea id="pickupAddress" class="form-control" required></textarea>
</div>

<button class="btn btn-warning w-100" type="button" onclick="bookNow()">
BOOK NOW
</button>

</form>
</div>
</div>
</div>

<!-- RIGHT SUMMARY -->
<div class="col-md-5">
<div class="card shadow">
<div class="card-header bg-dark text-white">
<h5>YOUR BOOKING DETAILS</h5>
</div>

<div class="card-body">
<p><b>Itinerary :</b> <span id="route"></span></p>
<p><b>Pickup Date :</b> <span id="date"></span></p>
<p><b>Pickup Time :</b> <span id="time"></span></p>
<p><b>Car Type :</b> <span id="car"></span></p>
<p><b>KMs Included :</b> <span id="km"></span> KM</p>

<hr>

<h4 class="text-warning">Total Fare : ₹<span id="fare"></span></h4>

<hr>

<ul>
<li>Base Fare & Fuel Charges</li>
<li>Driver Allowance Included</li>
<li>State Tax & Toll Extra</li>
</ul>

</div>
</div>
</div>

</div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- Your JS -->
<script src="js/firebase.js"></script>
<script src="js/booking.js"></script>

</body>
</html>
